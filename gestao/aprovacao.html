<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestão Call Center — Aprovação de Contrato</title>
  <link rel="stylesheet" href="css/style.css?v=1">
</head>
<body class="aprovacao-body">
  <div class="aprovacao-card" id="aprovacaoCard">
    <div id="aprovacaoLoading" style="text-align:center;padding:2rem">
      <div style="width:40px;height:40px;border:4px solid var(--slate-200);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 1rem"></div>
      <p style="color:var(--slate-500)">A carregar...</p>
    </div>

    <div id="aprovacaoError" style="display:none;text-align:center;padding:2rem">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--red-600)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin:0 auto 1rem;display:block">
        <circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/>
      </svg>
      <h2 style="font-size:1.1rem;color:var(--slate-900);margin-bottom:0.5rem">Link inválido ou expirado</h2>
      <p style="color:var(--slate-500);font-size:0.875rem">Este pedido de aprovação não foi encontrado ou já foi processado.</p>
    </div>

    <div id="aprovacaoConteudo" style="display:none">
      <div class="aprovacao-header">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin:0 auto 0.5rem;display:block">
          <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
        </svg>
        <h1>Gestão Call Center</h1>
        <p>Pedido de Aprovação de Contrato</p>
      </div>

      <div id="aprovacaoJaProcessado" style="display:none;text-align:center;padding:1rem;margin-bottom:1rem;border-radius:var(--radius-lg);font-weight:600"></div>

      <div class="aprovacao-dados" id="aprovacaoDados">
        <div class="aprovacao-linha"><span class="label">Cliente</span><span class="valor" id="apNome">—</span></div>
        <div class="aprovacao-linha"><span class="label">Serviço</span><span class="valor" id="apServico">—</span></div>
        <div class="aprovacao-linha"><span class="label">Operadora</span><span class="valor" id="apOperadora">—</span></div>
        <div class="aprovacao-linha"><span class="label">Valor Mensal</span><span class="valor" id="apValor">—</span></div>
        <div class="aprovacao-linha"><span class="label">Data de Envio</span><span class="valor" id="apData">—</span></div>
      </div>

      <div id="aprovacaoBotoes" style="display:flex;gap:0.75rem">
        <button class="btn btn-danger btn-full" id="btnRejeitar" onclick="responderAprovacao('rejeitado')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          Rejeitar
        </button>
        <button class="btn btn-primary btn-full" id="btnAprovar" onclick="responderAprovacao('aprovado')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          Aprovar
        </button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/appwrite@14/dist/iife/sdk.js"></script>
  <script>
    const APPWRITE_ENDPOINT = 'https://cloud.appwrite.io/v1';
    const APPWRITE_PROJECT = '6a4a96ae00150f4aa36a';
    const APPWRITE_DATABASE = '6a4a97150006afe07f8a';

    const sdk = new Appwrite.Client();
    sdk.setEndpoint(APPWRITE_ENDPOINT).setProject(APPWRITE_PROJECT);
    const database = new Appwrite.Databases(sdk);

    (function() {
      function getToken() {
        return new URLSearchParams(window.location.search).get('token');
      }

      async function carregar() {
        const token = getToken();
        if (!token) {
          document.getElementById('aprovacaoLoading').style.display = 'none';
          document.getElementById('aprovacaoError').style.display = 'block';
          return;
        }

        try {
          var res = await database.listDocuments(APPWRITE_DATABASE, 'aprovacoes', [
            Appwrite.Query.equal('token', token)
          ]);

          if (!res.documents || !res.documents.length) {
            document.getElementById('aprovacaoLoading').style.display = 'none';
            document.getElementById('aprovacaoError').style.display = 'block';
            return;
          }

          var aprovacao = res.documents[0];

          document.getElementById('apNome').textContent = aprovacao.clienteNome || '\u2014';
          document.getElementById('apServico').textContent = aprovacao.servicoNome || '\u2014';
          document.getElementById('apOperadora').textContent = aprovacao.operadora || '\u2014';
          document.getElementById('apValor').textContent = (parseFloat(aprovacao.valor) || 0).toFixed(2) + '\u20AC';
          document.getElementById('apData').textContent = aprovacao.dataEnvio ? new Date(aprovacao.dataEnvio + 'T12:00:00').toLocaleDateString('pt-PT') : '\u2014';

          if (aprovacao.status !== 'pendente') {
            const el = document.getElementById('aprovacaoJaProcessado');
            el.style.display = 'block';
            if (aprovacao.status === 'aprovado') {
              el.className = 'aprovacao-status aprovado';
              el.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline;vertical-align:middle;margin-right:4px"><polyline points="20 6 9 17 4 12"/></svg> Contrato j\u00e1 foi <strong>APROVADO</strong>';
            } else {
              el.className = 'aprovacao-status rejeitado';
              el.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline;vertical-align:middle;margin-right:4px"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> Contrato foi <strong>REJEITADO</strong>';
            }
            document.getElementById('aprovacaoBotoes').style.display = 'none';
          }

          document.getElementById('aprovacaoLoading').style.display = 'none';
          document.getElementById('aprovacaoConteudo').style.display = 'block';
        } catch (e) {
          console.error('Erro ao carregar aprova\u00e7\u00e3o:', e);
          document.getElementById('aprovacaoLoading').style.display = 'none';
          document.getElementById('aprovacaoError').style.display = 'block';
        }
      }

      window.responderAprovacao = async function(status) {
        const token = getToken();
        if (!token) return;

        try {
          var res = await database.listDocuments(APPWRITE_DATABASE, 'aprovacoes', [
            Appwrite.Query.equal('token', token)
          ]);
          if (!res.documents || !res.documents.length) return;

          var doc = res.documents[0];
          if (doc.status !== 'pendente') return;

          await database.updateDocument(APPWRITE_DATABASE, 'aprovacoes', doc.$id, {
            status: status,
            dataResposta: new Date().toISOString().slice(0, 10),
          });

          location.reload();
        } catch (e) {
          console.error('Erro ao responder aprova\u00e7\u00e3o:', e);
          alert('Erro ao processar a sua resposta. Tente novamente.');
        }
      };

      carregar();
    })();

    document.addEventListener('DOMContentLoaded', function() {
      var style = document.createElement('style');
      style.textContent = '@keyframes spin { to { transform: rotate(360deg); } }';
      document.head.appendChild(style);
    });
  </script>
</body>
</html>
